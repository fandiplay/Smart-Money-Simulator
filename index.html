<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#060913" />
  <title>Market Maker: The Liquidity Hunter</title>
  <style>
    /* --- RESET & BASE --- */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #060913;
      color: #e0e0e0;
      font-family: 'Courier New', 'Source Code Pro', 'Consolas', monospace;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: 100vh;
      overflow: hidden;
    }

    /* --- HEADER METRICS --- */
    #header-metrics {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      width: 100%;
      box-sizing: border-box;
      padding: 8px 12px;
      background: #0a0f1e;
      border-bottom: 1px solid #1a2340;
      flex-shrink: 0;
    }

    .metric-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 0;
      overflow: hidden;
    }

    .metric-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7a9e;
      margin-bottom: 2px;
    }

    .metric-value {
      font-size: 16px;
      font-weight: bold;
      color: #ffffff;
      white-space: nowrap;
    }

    .metric-value.positive {
      color: #00ff66;
    }

    .metric-value.negative {
      color: #ff3366;
    }

    .metric-value.bid {
      color: #00ff66;
    }

    .metric-value.ask {
      color: #ff3366;
    }

    /* --- CANVAS CONTAINER --- */
    #canvas-container {
      width: 100%;
      height: 40vh;
      flex-shrink: 0;
      background: #060913;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid #1a2340;
    }

    #chart-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* --- CONTROL PANEL --- */
    #control-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px 12px;
      flex-shrink: 0;
      background: #0a0f1e;
      border-bottom: 1px solid #1a2340;
    }

    .control-column {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      width: 100%;
      padding: 16px 8px;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: transparent;
      border: 2px solid;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn:disabled {
      opacity: 0.3 !important;
      cursor: not-allowed;
      transform: none;
    }

    .btn-buy {
      color: #00ff66;
      border-color: #00ff66;
    }

    .btn-buy:active {
      background: rgba(0, 255, 102, 0.15);
    }

    .btn-sell {
      color: #ff3366;
      border-color: #ff3366;
    }

    .btn-sell:active {
      background: rgba(255, 51, 102, 0.15);
    }

    .btn-close {
      color: #ffc400;
      border-color: #ffc400;
    }

    .btn-close:active {
      background: rgba(255, 196, 0, 0.15);
    }

    /* --- SLIDER ROW --- */
    #slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      flex-shrink: 0;
      background: #0a0f1e;
      border-bottom: 1px solid #1a2340;
    }

    #slider-row label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7a9e;
      white-space: nowrap;
    }

    #volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: #1a2340;
      border-radius: 3px;
      outline: none;
    }

    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      background: #2a3a6a;
      border: 2px solid #4a6ab0;
      border-radius: 50%;
      cursor: pointer;
    }

    #volume-slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      background: #2a3a6a;
      border: 2px solid #4a6ab0;
      border-radius: 50%;
      cursor: pointer;
    }

    #volume-display {
      font-size: 18px;
      font-weight: bold;
      color: #ffffff;
      min-width: 60px;
      text-align: right;
    }

    /* --- TRADE HISTORY --- */
    #trade-history {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      background: #060913;
      min-height: 0;
    }

    #trade-history::-webkit-scrollbar {
      width: 4px;
    }

    #trade-history::-webkit-scrollbar-track {
      background: #0a0f1e;
    }

    #trade-history::-webkit-scrollbar-thumb {
      background: #1a2340;
      border-radius: 2px;
    }

    .trade-header {
      display: grid;
      grid-template-columns: 2fr 1fr 1.5fr 1.5fr 1fr;
      gap: 4px;
      padding: 6px 4px;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7a9e;
      border-bottom: 1px solid #1a2340;
    }

    .trade-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1.5fr 1.5fr 1fr;
      gap: 4px;
      padding: 8px 4px;
      font-size: 12px;
      border-bottom: 1px solid rgba(26, 35, 64, 0.5);
    }

    .trade-row .trade-type {
      font-weight: bold;
    }

    .trade-row .trade-type.buy-type {
      color: #00ff66;
    }

    .trade-row .trade-type.sell-type {
      color: #ff3366;
    }

    .trade-row .trade-type.close-type {
      color: #ffc400;
    }

    .trade-row .trade-pnl {
      font-weight: bold;
    }

    .trade-row .trade-pnl.positive {
      color: #00ff66;
    }

    .trade-row .trade-pnl.negative {
      color: #ff3366;
    }

    /* --- GAME OVER OVERLAY --- */
    #game-over-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(6, 9, 19, 0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
    }

    #game-over-overlay.active {
      display: flex;
      pointer-events: auto;
    }

    #game-over-overlay h1 {
      font-size: 36px;
      color: #ff3366;
      text-align: center;
      margin-bottom: 16px;
      text-shadow: 0 0 30px rgba(255, 51, 102, 0.5);
    }

    #game-over-overlay h2 {
      font-size: 18px;
      color: #ffc400;
      text-align: center;
      margin-bottom: 24px;
      letter-spacing: 2px;
    }

    #game-over-overlay p {
      font-size: 14px;
      color: #6b7a9e;
      text-align: center;
    }

    #restart-btn {
      margin-top: 32px;
      padding: 16px 48px;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ffffff;
      background: #1a2340;
      border: 2px solid #4a6ab0;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #restart-btn:active {
      background: #2a3a6a;
      transform: scale(0.97);
    }

    /* --- RESPONSIVE --- */
    @media (max-width: 480px) {
      .metric-value {
        font-size: 13px;
      }

      .btn {
        padding: 14px 6px;
        font-size: 13px;
      }

      #game-over-overlay h1 {
        font-size: 28px;
      }
    }

    @media (min-width: 768px) {
      #app {
        max-width: 600px;
        margin: 0 auto;
        border-left: 1px solid #1a2340;
        border-right: 1px solid #1a2340;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header Metrics -->
    <div id="header-metrics">
      <div class="metric-item">
        <span class="metric-label">AUM</span>
        <span class="metric-value" id="metric-aum">$100,000</span>
      </div>
      <div class="metric-item">
        <span class="metric-label">PnL</span>
        <span class="metric-value" id="metric-pnl">$0</span>
      </div>
      <div class="metric-item">
        <span class="metric-label">BID</span>
        <span class="metric-value bid" id="metric-bid">—</span>
      </div>
      <div class="metric-item">
        <span class="metric-label">ASK</span>
        <span class="metric-value ask" id="metric-ask">—</span>
      </div>
      <div class="metric-item">
        <span class="metric-label">SWEEPS</span>
        <span class="metric-value" id="metric-sweeps">0</span>
      </div>
    </div>

    <!-- Canvas -->
    <div id="canvas-container">
      <canvas id="chart-canvas"></canvas>
      <div id="game-over-overlay">
        <h1>ACCOUNT MARGIN CALL</h1>
        <h2>AUM LIQUIDATED</h2>
        <p>GAME OVER</p>
        <button id="restart-btn">RESTART</button>
      </div>
    </div>

    <!-- Control Panel -->
    <div id="control-panel">
      <div class="control-column">
        <button class="btn btn-buy" id="btn-inject-buy">▲ INJECT BUY</button>
        <button class="btn btn-close" id="btn-close-long" disabled style="opacity:0.3">◆ CLOSE LONG</button>
      </div>
      <div class="control-column">
        <button class="btn btn-sell" id="btn-inject-sell">▼ INJECT SELL</button>
        <button class="btn btn-close" id="btn-close-short" disabled style="opacity:0.3">◆ CLOSE SHORT</button>
      </div>
    </div>

    <!-- Slider -->
    <div id="slider-row">
      <label for="volume-slider">VOLUME</label>
      <input type="range" id="volume-slider" min="100" max="5000" value="1000" step="100" />
      <span id="volume-display">1,000</span>
    </div>

    <!-- Trade History -->
    <div id="trade-history">
      <div class="trade-header">
        <span>Type</span>
        <span>Vol</span>
        <span>Price</span>
        <span>PnL</span>
        <span>Time</span>
      </div>
      <div id="trade-log-entries"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
